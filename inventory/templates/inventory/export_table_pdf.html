<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: Helvetica, Arial, sans-serif; font-size: 11px; color: #2d241d; }
  h1 { color: #d46800; font-size: 18px; }
  table { width: 100%; border-collapse: collapse; }
  th, td { border: 1px solid #ead9c7; padding: 6px; }
  th { background: #f7f1e8; }
</style>
</head>
<body>
  <h1>{{ title }}</h1>
  <table>
    <thead><tr>{% for header in headers %}<th>{{ header }}</th>{% endfor %}</tr></thead>
    <tbody>
      {% for row in rows %}
      <tr>{% for cell in row %}<td>{{ cell }}</td>{% endfor %}</tr>
      {% endfor %}
    </tbody>
  </table>
</body>
</html>
