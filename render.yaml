services:
  - type: web
    name: gem-brochure-tracker
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: gem-brochure-tracker.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: gem-brochure-db
          property: connectionString

databases:
  - name: gem-brochure-db
    plan: free
